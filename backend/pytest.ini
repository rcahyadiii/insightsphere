[pytest]
# Pytest config terpusat untuk backend.
#
# `filterwarnings`:
# - Bisukan DeprecationWarning dari `slowapi/extension.py:717` yang memanggil
#   `asyncio.iscoroutinefunction` (deprecated di Python 3.16). Itu di luar
#   kode kita; setelah upstream rilis fix, item ini bisa dihapus.
# - Bisukan PytestCacheWarning saat path .pytest_cache sudah ada (race agent runs).
#
# Kalau `slowapi` di-bump dan warning hilang, hapus baris filter terkait.
filterwarnings =
    ignore::DeprecationWarning:slowapi.extension
    ignore::pytest.PytestCacheWarning
